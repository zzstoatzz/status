app = 'zzstoatzz-quickslice-status'
primary_region = 'ewr'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'
  EXTERNAL_BASE_URL = 'https://status.zzstoatzz.io'

[[mounts]]
  source = 'quickslice_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks.health]
  type = "http"
  port = 3000
  path = "/_health"
  interval = "30s"
  timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
